name: Validate Cloudflare Pages output

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Build Pages output
        run: pnpm run build:pages

      - name: Test rendered routes and guardrails
        run: node --test tests/rendered-html.test.mjs

      - name: Validate glossary routes and redirects
        run: pnpm run routes:check

      - name: Verify checked-in route artifacts
        run: pnpm run routes:artifacts:check

      - name: Crawl canonical routes and redirects
        run: pnpm run crawl:static

      - name: Confirm deployable output
        run: |
          test -f out/index.html
          test -f out/services/index.html
          test -f out/services/ongoing-seo/index.html
          test -f out/services/web-design-redesign/index.html
          test -f out/services/provider-rescue/index.html
          test -f out/services/research-audits-strategy/index.html
          test -f out/services/custom-digital-solutions/index.html
          test -f out/pricing/index.html
          test -f out/work/index.html
          test -f out/resources/index.html
          test -f out/industries/index.html
          test -f out/industries/home-improvement-contractors/index.html
          test -f out/industries/local-service-businesses/index.html
          test -f out/industries/brick-and-mortar-retail-hospitality/index.html
          test -f out/industries/online-retail-ecommerce/index.html
          test -f out/industries/professional-b2b-services/index.html
          test -f out/start/index.html
          test -f out/robots.txt
          test -f out/sitemap.xml
          test -f out/_headers
          test -f out/_redirects
          test -n "$(find out/_next/static -type f -name '*.css' -print -quit)"
          test -f out/brand/boho-bee-logo-v2-256.png
          test -f out/brand/github-invertocat-white.svg
          test -f out/diagrams/boho-hosting-architecture-v2.png
          test -f out/visuals/services/ongoing-seo-v1.webp
          test -f out/visuals/homepage-industry-contractors-v2.webp
          test -f out/visuals/homepage-industry-local-service-v2.webp
          test -f out/visuals/homepage-industry-retail-v2.webp
          test -f out/visuals/homepage-industry-ecommerce-v2.webp
          test -f out/visuals/homepage-industry-b2b-v2.webp
          test -f out/favicon.ico
          test -f out/boho-digital-services-social-v2.png
          test -z "$(find out -type f -name '_worker.js' -print -quit)"
          test ! -e .wrangler/deploy/config.json
