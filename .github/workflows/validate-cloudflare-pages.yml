name: Validate Cloudflare Pages output

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Build Pages output
        run: pnpm run build:pages

      - name: Test rendered routes and guardrails
        run: node --test tests/rendered-html.test.mjs

      - name: Confirm deployable output
        run: |
          test -f dist/client/_worker.js
          test -f dist/server/index.js
